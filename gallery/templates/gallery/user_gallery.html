{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <h2 class="mb-4">My Gallery</h2>

  <!-- Upload form -->
  <form method="post" enctype="multipart/form-data" class="mb-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">📤 Upload Photo</button>
  </form>

  <div class="row">
    {% for photo in photos %}
      <div class="col-md-4 mb-4">
        <div class="card shadow">
         <img src="{% static 'images/default-avatar.png' %}" alt="Default Avatar">

            <p class="card-text">{{ photo.caption }}</p>
            <a href="{% url 'accounts:edit_photo' photo.id %}" class="btn btn-primary btn-sm">✏️ Edit</a>
            <a href="{% url 'accounts:delete_photo' photo.id %}" class="btn btn-danger btn-sm">🗑 Delete</a>
          </div>
        </div>
      </div>
    {% empty %}
      <p>You haven’t uploaded any photos yet.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
