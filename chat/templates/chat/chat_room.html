{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <h2>💬 Chat Room</h2>

  <div class="chat-box" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll;">
    {% for msg in messages %}
      <p><strong>{{ msg.sender.username }}</strong>: {{ msg.text }} <small>{{ msg.timestamp|date:"H:i" }}</small></p>
    {% empty %}
      <p>No messages yet.</p>
    {% endfor %}
  </div>

  <form method="post" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Send</button>
  </form>
</div>
{% endblock %}
