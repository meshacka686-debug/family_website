{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg p-4">
    <h2 class="mb-4">Edit Your Profile</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      
      <h4>Account Info</h4>
      {{ user_form.as_p }}

      <h4>Profile Info</h4>
      {{ profile_form.as_p }}

      <button type="submit" class="btn btn-success mt-3">💾 Save Changes</button>
      <a href="{% url 'accounts:profile' %}" class="btn btn-secondary mt-3">⬅️ Back to Profile</a>
    </form>
  </div>
</div>
{% endblock %}
