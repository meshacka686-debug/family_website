{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container mt-5 d-flex justify-content-center">

  <!-- Profile Card -->
  <div class="card shadow-lg text-center" style="max-width: 400px;">
    <div class="card-body">
      <!-- Profile Picture -->
      {% if user.profile.picture %}
        <img src="{{ user.profile.picture.url }}" 
             alt="Profile Picture" 
             class="rounded-circle mb-3 border border-3 border-primary" 
             style="width: 150px; height: 150px; object-fit: cover;">
      {% else %}
        <img src="{% static 'images/default-avatar.png' %}" 
             alt="Default Avatar" 
             class="rounded-circle mb-3 border border-3 border-secondary" 
             style="width: 150px; height: 150px; object-fit: cover;">
      {% endif %}

      <!-- Name -->
      <h2 class="fw-bold">{{ user.first_name }} {{ user.last_name }}</h2>
    </div>
  </div>

</div>
{% endblock %}
