<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Viewport ensures mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Family Website{% endblock %}</title>
  {% load static %}

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">👨‍👩‍👧 The Family Of Inkabi</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'chat:chat_room' %}">Chat</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'gallery:list' %}">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'notifications:list' %}">Notifications</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'accounts:profile' %}">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'accounts:gallery_view' %}">My Gallery</a></li>
          <li class="nav-item">
            <form action="{% url 'accounts:logout' %}" method="post" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="btn btn-link nav-link">Logout</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container my-5 flex-grow-1">
    <div class="card shadow-sm p-4 bg-white rounded">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-primary text-white text-center py-3 mt-auto">
    <p class="mb-0">© {{ year }} Family Website | Built with ❤️ by Meshack</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
